# FeelAtHomeNow — local/production stack
# Usage: copy .env.example to .env, set variables, then: docker compose up -d
#
# Backend connects as POSTGRES_APP_USER (default feelathomenow_app), NOT the Postgres superuser,
# so Row Level Security applies. MIGRATE_DATABASE_URL uses the bootstrap user for Alembic + grants.

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-feelathomenow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-feelathomenow}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Privileged: migrations + scripts/ci_grant_app_role.py (table owner / DDL)
      MIGRATE_DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-feelathomenow}
      # Runtime: NOSUPERUSER NOBYPASSRLS (created by entrypoint grant script)
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_APP_USER:-feelathomenow_app}:${POSTGRES_APP_PASSWORD}@postgres:5432/${POSTGRES_DB:-feelathomenow}
      CI_MIGRATION_ROLE: ${POSTGRES_USER:-postgres}
      CI_APP_ROLE_PASSWORD: ${POSTGRES_APP_PASSWORD:?Set POSTGRES_APP_PASSWORD in .env}
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      args:
        - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
