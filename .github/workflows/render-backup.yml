name: Render Backup

on:
  workflow_dispatch:

jobs:
  trigger-backup:
    runs-on: ubuntu-latest

    steps:
      - name: List visible Render Postgres instances
        run: |
          set -euo pipefail

          echo "Listing visible Render Postgres instances..."

          RESPONSE=$(curl -sS -f "https://api.render.com/v1/postgres" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}")

          echo "$RESPONSE"
