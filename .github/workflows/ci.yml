# FeelAtHomeNow CI — backend import check + frontend build (no deployment)
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Backend import test
        env:
          SECRET_KEY: ci-placeholder-secret-key-min-32-chars
        run: |
          cd backend
          python -c "from server import app; print('OK')"

      - name: Backend tests
        env:
          SECRET_KEY: ci-placeholder-secret-key-min-32-chars
        run: |
          cd backend
          pytest tests/test_critical_paths.py -v

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Frontend tests
        run: |
          cd frontend
          npm test -- --watchAll=false --testPathPattern="landlord"

      - name: Frontend build
        run: |
          cd frontend
          npm run build
